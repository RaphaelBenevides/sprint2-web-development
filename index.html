<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOVI SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>JOVI SHOP</h1>
  <p>Projeto Sprint 2 - FIAP</p>
</header>

<main>

<section class="card">

<h2>Login</h2>

<input type="email" id="email" placeholder="Digite seu email">
<input type="password" id="senha" placeholder="Digite sua senha">

<button id="loginBtn">Entrar</button>

<hr>

<h2>Criar Conta</h2>

<input type="text" id="novoNome" placeholder="Digite seu nome">
<input type="email" id="novoEmail" placeholder="Digite seu email">
<input type="password" id="novaSenha" placeholder="Crie uma senha">

<button id="criarContaBtn">Criar Conta</button>

<p id="mensagemConta"></p>

</section>


<section class="card">

<h2>Slideshow</h2>

<img id="slide" src="./images/img1.png" alt="Imagem">

<br><br>

<button id="trocarImagem">Trocar Imagem</button>

</section>


<section class="card">

<h2>Eventos DOM</h2>

<button id="botaoCor">Passar Mouse</button>

<p id="texto">Texto original</p>

</section>


<section class="card">

<h2>Manipulação de Strings</h2>

<input type="text" id="nome" placeholder="Digite seu nome">

<button id="mostrarNome">Mostrar Nome</button>

<p id="resultadoNome"></p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
