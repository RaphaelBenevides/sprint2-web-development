<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>JOVI-Web Dev</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>JOVI SHOP</h1>
    <p>Projeto Sprint 2 - FIAP</p>
  </header>

  <main>

    <section class="card">

      <h2>Login</h2>

      <input type="email" id="email" placeholder="Digite seu email">
      <input type="password" id="senha" placeholder="Digite sua senha">

      <button id="loginBtn">Entrar</button>

      <hr>

      <h2>Criar Conta</h2>

      <input type="text" id="novoNome" placeholder="Digite seu nome">
      <input type="email" id="novoEmail" placeholder="Digite seu email">
      <input type="password" id="novaSenha" placeholder="Crie uma senha">

      <button id="criarContaBtn">Criar Conta</button>

      <p id="mensagemConta"></p>

    </section>

    <section class="card">
      <h2>Galeria</h2>

      <img id="slide" src="images/img1.jpg" alt="Imagem do slideshow">

      <div class="botoes-slide">
        <button id="anterior">Anterior</button>
        <button id="proximo">Próximo</button>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 JOVI SHOP - Sprint Web Development</p>
  </footer>

  <script src="script.js"></script>

</body>

</html>
